<!DOCTYPE html>
<html lang="en">
<head>
    <title>LA Crime Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Favicon: https://www.pinterest.com/pin/los-angeles-logo-720x1440-red-backgrounds--577305246001989652/ -->
    <link rel="icon" type="image/x-icon" href="Project-InfoVis\infoVis\favicon-32x32.png" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<header id="header">
    <button id="sidebar-toggle-btn" title="Toggle sidebar">&#9776;</button>
    <h1>LA Crime Dashboard</h1>
    <div id="search-bar">
        <input id="search-input" type="text" placeholder="Search address, DR_NO, crime type&hellip;" />
        <button id="search-btn">Search</button>
    </div>
</header>

<div id="main">
    <aside id="sidebar">

        <div class="sb-section">
            <div class="sb-section-hdr open" data-target="sb-filters">
                Filters <span class="caret">&#9660;</span>
            </div>
            <div class="sb-section-body" id="sb-filters">
                <div class="filter-group">
                    <label>Date range</label>
                    <div class="range-row">
                        <input type="date" id="filter-date-from" />
                        <span>&ndash;</span>
                        <input type="date" id="filter-date-to" />
                    </div>
                </div>
                <div class="filter-group">
                    <label>Crime type</label>
                    <select id="filter-crime-type"><option value="">All types</option></select>
                </div>
                <div class="filter-group">
                    <label>Victim gender</label>
                    <select id="filter-gender">
                        <option value="">All</option>
                        <option value="M">Male</option>
                        <option value="F">Female</option>
                        <option value="X">Unknown / Other</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Victim age</label>
                    <div class="range-row">
                        <input type="number" id="filter-age-min" placeholder="0" min="0" max="120" />
                        <span>&ndash;</span>
                        <input type="number" id="filter-age-max" placeholder="120" min="0" max="120" />
                    </div>
                </div>
                <div class="filter-group">
                    <label>Status</label>
                    <select id="filter-status"><option value="">All statuses</option></select>
                </div>
                <button class="btn-primary" id="apply-filters-btn">Apply filters</button>
                <button class="btn-ghost"   id="reset-filters-btn">Reset</button>
            </div>
        </div>

        <div class="sb-section">
            <div class="sb-section-hdr open" data-target="sb-map-ctrl">
                Map controls <span class="caret">&#9660;</span>
            </div>
            <div class="sb-section-body" id="sb-map-ctrl">
                <button class="map-ctrl-btn" id="btn-heatmap">&#127777;&#65039; Heatmap</button>
                <button class="map-ctrl-btn" id="btn-draw-region">&#9998;&#65039; Draw region</button>
                <button class="map-ctrl-btn" id="btn-clear-region">&#10005; Clear region</button>
            </div>
        </div>

    </aside>

    <div id="content">
        <div id="map"></div>
        <div id="map-loading" class="hidden">
            <div id="map-loading-card">
                <div class="map-loading-spinner"></div>
                <span>Loading area data&hellip;</span>
            </div>
        </div>

        <div id="bottom-panel">
            <div id="panel-tab-bar">
                <div class="panel-tab active" data-pane="pane-stats">Stats</div>
                <div class="panel-tab" data-pane="pane-trends">Trends over time</div>
                <div class="panel-tab" data-pane="pane-correlations">Correlations</div>
                <button id="panel-collapse-btn">&#9660;</button>
            </div>

            <div class="panel-pane active" id="pane-stats">
                <div id="charts-loading">
                    <div id="charts-loading-spinner"></div>
                    <div id="charts-loading-text">Loading charts…</div>
                </div>
                <div class="stat-cards">
                    <div class="stat-card">
                        <div class="val" id="stat-total">&#8212;</div>
                        <div class="lbl">Total incidents</div>
                    </div>
                    <div class="stat-card">
                        <div class="val" id="stat-filtered">&#8212;</div>
                        <div class="lbl">Shown / filtered</div>
                    </div>
                    <div class="stat-card">
                        <div class="val" id="stat-top-crime">&#8212;</div>
                        <div class="lbl">Top crime type</div>
                    </div>
                    <div class="stat-card">
                        <div class="val" id="stat-top-area">&#8212;</div>
                        <div class="lbl">Top area</div>
                    </div>
                </div>
                <div class="vr"></div>
                <div id="chart-bar" class="chart-placeholder"></div>
            </div>

            <div class="panel-pane" id="pane-trends">
                <div id="trends-loading" class="charts-loading">
                    <div class="charts-loading-spinner"></div>
                    <div class="charts-loading-text">Loading chart…</div>
                </div>
                <div id="chart-trends" class="chart-placeholder"></div>
            </div>

            <div class="panel-pane" id="pane-correlations">
                <div id="corr-loading" class="charts-loading">
                    <div class="charts-loading-spinner"></div>
                    <div class="charts-loading-text">Loading charts…</div>
                </div>
                <div id="chart-corr" style="display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 16px; flex: 1; min-height: 0; width: 100%;">
                    <div id="chart-corr-gender" class="chart-placeholder"></div>
                    <div id="chart-corr-descent" class="chart-placeholder"></div>
                    <div id="chart-corr-age" class="chart-placeholder"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
